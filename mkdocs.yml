site_name: NEOXLINK SDK
site_url: https://neowalter.github.io/NEOXLINK-SDK/
site_description: Natural language → structured intent — UNSPSC, MCP, typed outputs for agents and backends.
repo_url: https://github.com/neowalter/NEOXLINK-SDK
edit_uri: edit/main/docs/
repo_name: neowalter/NEOXLINK-SDK

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/library
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - content.code.copy
    - content.action.edit
  palette:
    # Default: dark (slate) so custom CSS and hero always match; user can toggle to light
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-2
        name: Dark mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/neowalter/NEOXLINK-SDK
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/neoxlink/

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Typed Outputs: typed-outputs.md
  - API:
      - neoxlink_sdk: api/neoxlink_sdk.md
