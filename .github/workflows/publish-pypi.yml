# Publish sdist/wheel to PyPI using PyPA's official action:
# https://github.com/marketplace/actions/pypi-publish
#
# API token path: set secret PYPI_API_TOKEN on GitHub Environment "pypi".
# Without Trusted Publishing, the action must not request OIDC for attestations:
#   attestations: false
# (Otherwise you get: "missing or insufficient OIDC token permissions".)
#
# OIDC / Trusted Publishing path: remove `password` + `attestations: false`, add
# `id-token: write` on this job, configure PyPI trusted publisher.
#
name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build
        run: python -m pip install --upgrade pip build
      - name: Build sdist and wheel
        run: python -m build
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Upload to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      github.event_name == 'workflow_dispatch'
    environment:
      name: pypi
      url: https://pypi.org/project/neoxlink/
    permissions:
      actions: read
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Ensure PyPI token is present
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "${PYPI_API_TOKEN}" ]; then
            echo "::error::PYPI_API_TOKEN is empty. Add it under Settings → Environments → pypi → Environment secrets."
            exit 1
          fi
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          attestations: false
