[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "neoxlink-sdk"
version = "0.1.0"
description = "Public SDK and core contracts for NEOXLINK"
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["httpx>=0.27.0", "pydantic>=2.8.2"]

[tool.setuptools]
packages = ["neoxlink_sdk"]
